<!DOCTYPE html>
<html lang="en">

<head>
    <title>Form registration adding image to profile</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="author" content="https://github.com/adhirsaurio" />
    <meta name="description" content="Form registration adding image to profile" />
    <!-- Favicon -->
    <link href="assets/img/cafe.png" type="image/x-icon" rel="icon"/>
    <!-- Bootstrap v5.3-->
    <link href="assets/css/bootstrap5.3.css" rel="stylesheet"/>
    <link href="assets/css/bootstrap-icons.css" rel="stylesheet">
    <!-- Your custom css -->
    <link href="assets/css/custom.css" rel="stylesheet" />
    <!-- Bootstrap v5.3 core JS-->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- JQuery -->
    <script src="assets/js/jquery.min.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Fork me on GitHub -->
  <span id="forkongithub"><a href="https://github.com/adhirsaurio/Form-registration-adding-image-to-profile">Fork me on GitHub<i class="bi bi-github"></i></a></span>

  <!-- Registration form -->
  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        
        <div class="card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            
            <h3 class="text-center mb-4">Form Registration</h3>
            
            <form method="POST" id="registerForm" enctype="multipart/form-data">
              
              <!-- Username -->
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="userName" name="userName" placeholder="NoobMaster5000EX" required>
                <label for="userName">User name</label>
              </div>

              <!-- Email -->
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                <label for="email">Email address</label>
              </div>

              <!-- Password -->
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="entryPass" name="entryPass" placeholder="Password" required>
                <label for="entryPass">Password</label>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <input type="hidden" id="action" name="action" value="formRegistration">
                <button type="submit" id="buttonAction" class="btn btn-primary btn-lg">
                  Sign up
                </button>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </section>
    
  <!-- YOUR CUSTOM SCRIPTS -->
  <script src="assets/js/scripts.js"></script>
</body>
</html>
